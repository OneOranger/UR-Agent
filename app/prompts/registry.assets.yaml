  product_strategist: "app/prompts/system/product_strategist.yaml"
  research_planner: "app/prompts/system/research_planner.yaml"
  journey_designer: "app/prompts/system/journey_designer.yaml"

task_prompts:
  clarify_goal: "app/prompts/tasks/clarify_goal.yaml"
  planner: "app/prompts/tasks/planner.yaml"
  theme_extractor: "app/prompts/tasks/theme_extractor.yaml"
  persona_builder: "app/prompts/tasks/persona_builder.yaml"
  journey_mapper: "app/prompts/tasks/journey_mapper.yaml"
